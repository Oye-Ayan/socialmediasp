spring:
  datasource:
    url: jdbc:mysql://localhost:3306/social_media_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 0987
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  cache:
    type: simple

server:
  port: 8080

jwt:
  secret: mySecretKeyThatIsAtLeast256BitsLongForHMACSHA256Algorithm123456
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  logging:
    level:
      org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR